apiVersion: deployments.plural.sh/v1alpha1
kind: AgentRuntime
metadata:
  name: test-codex
  namespace: codex
spec:
  type: "CODEX"
  targetNamespace: "codex"
  config:
    codex:
      apiKeySecretRef:
        name: codex-api-key
        key: apiKey
  template:
    spec:
      containers:
        - name: default
          image: ghcr.io/pluralsh/agent-harness:0.6.33-codex-0.104.0
          args:
            - --v=3
  dind: false
  bootstrapScript: |
    #!/bin/bash
    set -e
    echo "Bootstrapping the agent runtime environment..."
    sleep 5  # Simulate some setup time
    echo "Bootstrap complete."
